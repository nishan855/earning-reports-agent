services:
  - type: web
    name: qern
    runtime: python
    buildCommand: pip install uv && uv sync --frozen
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12"
